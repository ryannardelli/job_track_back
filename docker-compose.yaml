version: '3.8'

services:
  api:
    build: .
    container_name: jobtrack
    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run start

  db:
    image: postgres:15
    container_name: jobtrack_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtrack

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data: